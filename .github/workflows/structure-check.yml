name: Unity Repo Structure Check

on:
    pull_request:
    push:

jobs:
    structure:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Validate Unity project layout
              shell: bash
              run: |
                  set -euo pipefail
                  err=0

                  # 1) Required root folders
                  for d in Assets Packages ProjectSettings; do
                    if [[ ! -d "$d" ]]; then
                      echo "::error::Missing '$d/' at repo root."
                      err=1
                    fi
                  done

                  # 2) Disallow nested Unity projects (extra Assets/ or ProjectSettings/)
                  while IFS= read -r p; do
                    # normalize path w/out leading ./ 
                    p="${p#./}"
                    if [[ "$p" != "Assets" ]]; then
                      echo "::error::Nested Unity project detected at '$p' (remove or move contents to repo root)."
                      err=1
                    fi
                  done < <(find . -type d -name Assets | sort)

                  while IFS= read -r p; do
                    p="${p#./}"
                    if [[ "$p" != "ProjectSettings" ]]; then
                      echo "::error::Nested Unity project detected at '$p' (remove or move contents to repo root)."
                      err=1
                    fi
                  done < <(find . -type d -name ProjectSettings | sort)

                  # 3) Reject cache/build dirs in Git
                  for d in Library Temp Obj Obj/ Debug Release Builds Build Logs; do
                    if [[ -e "$d" ]]; then
                      echo "::error::'$d/' must not be committed. Delete it and update .gitignore."
                      err=1
                    fi
                  done

                  # 4) Optional: ensure .gitattributes exists (LFS rules)
                  if [[ ! -f ".gitattributes" ]]; then
                    echo "::warning::.gitattributes missing. Add Git LFS patterns for Unity binaries."
                  fi

                  exit $err
